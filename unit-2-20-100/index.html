<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Numbers Adventure (20-100)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
        }

        .kids-font { font-family: 'Fredoka One', cursive; }

        .quiz-card {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 10px solid #ffffff;
            overflow: hidden;
        }

        .number-display {
            font-size: 6rem;
            color: #4834d4;
            text-shadow: 4px 4px #dff9fb;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn-hover {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-hover:active { transform: scale(0.9); }

        .input-box {
            border: 4px solid #f093fb;
            border-radius: 20px;
            font-size: 1.5rem;
            text-align: center;
            transition: all 0.3s;
        }
        .input-box:focus {
            outline: none;
            border-color: #4834d4;
            box-shadow: 0 0 15px rgba(72, 52, 212, 0.2);
        }

        .feedback-pop {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="p-4">

    <!-- Start Screen -->
    <div id="start-screen" class="quiz-card p-10 text-center">
        <h1 class="kids-font text-5xl text-purple-600 mb-6">Number Adventure!</h1>
        <p class="text-xl text-gray-600 mb-8">Can you write numbers 20-100 in English?</p>
        <button onclick="initQuiz()" class="bg-yellow-400 hover:bg-yellow-500 text-white kids-font text-3xl py-6 px-12 rounded-full shadow-xl btn-hover">
            START!
        </button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="quiz-card hidden">
        <div class="bg-purple-100 p-4 flex justify-between items-center border-b-4 border-white">
            <span id="level-indicator" class="kids-font text-purple-600 text-lg">LEVEL 1: Writing Numbers</span>
            <span id="q-counter" class="bg-white px-4 py-1 rounded-full font-bold text-purple-600">Question 1/15</span>
        </div>

        <div class="p-8 text-center">
            <div id="question-area" class="mb-10">
                <div id="display-value" class="number-display kids-font">25</div>
                <div id="math-expression" class="text-4xl text-blue-500 font-bold hidden">12 + 13</div>
            </div>

            <div class="mb-8">
                <input type="text" id="answer-input" placeholder="Type the number here..." 
                       class="input-box w-full p-4 mb-4" autocomplete="off" spellcheck="false">
                
                <div class="flex justify-center gap-4">
                    <button onclick="speakCurrentQuestion()" class="bg-blue-400 text-white p-4 rounded-full shadow-lg btn-hover">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    <button id="check-btn" onclick="checkAnswer()" class="bg-green-500 text-white kids-font text-2xl py-4 px-10 rounded-2xl shadow-lg btn-hover">
                        CHECK
                    </button>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden bg-orange-500 text-white kids-font text-2xl py-4 px-10 rounded-2xl shadow-lg btn-hover">
                        NEXT ➜
                    </button>
                </div>
            </div>

            <div id="feedback-msg" class="h-16 flex flex-col items-center justify-center text-2xl font-bold"></div>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="quiz-card p-10 text-center hidden">
        <h1 class="kids-font text-5xl text-orange-500 mb-6">Finished!</h1>
        <div class="bg-yellow-50 p-8 rounded-3xl mb-8 border-4 border-dashed border-yellow-200">
            <p class="text-3xl mb-4 kids-font text-gray-700">Your Score</p>
            <div class="flex justify-around">
                <div>
                    <span class="block text-5xl font-bold text-green-500" id="stat-correct">0</span>
                    <span class="text-gray-500 font-bold">Correct</span>
                </div>
                <div>
                    <span class="block text-5xl font-bold text-red-400" id="stat-wrong">0</span>
                    <span class="text-gray-500 font-bold">Wrong</span>
                </div>
            </div>
        </div>
        <button onclick="location.reload()" class="bg-purple-600 text-white kids-font text-3xl py-6 px-12 rounded-full shadow-xl btn-hover">
            PLAY AGAIN
        </button>
    </div>

    <script>
        const numberWords = {
            0: "zero", 1: "one", 2: "two", 3: "three", 4: "four", 5: "five", 6: "six", 7: "seven", 8: "eight", 9: "nine",
            10: "ten", 11: "eleven", 12: "twelve", 13: "thirteen", 14: "fourteen", 15: "fifteen", 16: "sixteen", 17: "seventeen", 18: "eighteen", 19: "nineteen",
            20: "twenty", 30: "thirty", 40: "forty", 50: "fifty", 60: "sixty", 70: "seventy", 80: "eighty", 90: "ninety", 100: "one hundred"
        };

        function numberToEnglish(n) {
            if (n === 100) return "one hundred";
            if (n <= 20) return numberWords[n];
            if (n % 10 === 0) return numberWords[n];
            return numberWords[Math.floor(n / 10) * 10] + " " + numberWords[n % 10];
        }

        const PRAISE = ["Well done!", "Good job!", "Excellent!", "Very good!"];
        let questions = [];
        let currentIdx = 0;
        let wrongs = 0;
        let stats = { correct: 0, wrong: 0 };
        let quizActive = false;

        function initQuiz() {
            questions = [];
            // Part 1: 10 random numbers from 20-100
            let p1Numbers = [];
            while(p1Numbers.length < 10) {
                let r = Math.floor(Math.random() * 81) + 20;
                if(!p1Numbers.includes(r)) p1Numbers.push(r);
            }
            p1Numbers.forEach(n => {
                questions.push({ type: 1, value: n, answer: numberToEnglish(n) });
            });

            // Part 2: 5 math problems
            for(let i=0; i<5; i++) {
                let op = Math.random() > 0.5 ? '+' : '-';
                let a, b, res;
                do {
                    a = Math.floor(Math.random() * 50) + 10;
                    b = Math.floor(Math.random() * 50) + 10;
                    res = (op === '+') ? (a + b) : (a - b);
                } while (res < 20 || res > 105);
                
                questions.push({ 
                    type: 2, 
                    display: `${a} ${op} ${b}`, 
                    value: res, 
                    answer: numberToEnglish(res) 
                });
            }

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            currentIdx = 0;
            stats = { correct: 0, wrong: 0 };
            quizActive = true;
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            wrongs = 0;
            
            document.getElementById('level-indicator').innerText = q.type === 1 ? "LEVEL 1: Writing Numbers" : "LEVEL 2: Math Fun";
            document.getElementById('q-counter').innerText = `Question ${currentIdx + 1}/${questions.length}`;
            
            const valDisplay = document.getElementById('display-value');
            const mathDisplay = document.getElementById('math-expression');
            const feedback = document.getElementById('feedback-msg');
            const input = document.getElementById('answer-input');

            if(q.type === 1) {
                valDisplay.innerText = q.value;
                valDisplay.classList.remove('hidden');
                mathDisplay.classList.add('hidden');
            } else {
                mathDisplay.innerText = q.display;
                mathDisplay.classList.remove('hidden');
                valDisplay.classList.add('hidden');
            }

            input.value = "";
            input.disabled = false;
            feedback.innerText = "";
            document.getElementById('check-btn').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            
            setTimeout(() => speakCurrentQuestion(), 500);
            input.focus();
        }

        function speakCurrentQuestion() {
            const q = questions[currentIdx];
            const text = q.type === 1 ? q.value.toString() : q.display.replace('+', 'plus').replace('-', 'minus');
            speakText(text);
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'en-US';
                ut.rate = 0.75;
                ut.pitch = 1.3;
                
                const voices = window.speechSynthesis.getVoices();
                const kidVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google US English'));
                if(kidVoice) ut.voice = kidVoice;
                
                window.speechSynthesis.speak(ut);
            }
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input');
            const userAns = input.value.trim().toLowerCase().replace(/-/g, ' '); // allow 'twenty-nine' as 'twenty nine'
            const correctAns = questions[currentIdx].answer.toLowerCase();
            const feedback = document.getElementById('feedback-msg');

            if(userAns === correctAns) {
                stats.correct++;
                const praise = PRAISE[Math.floor(Math.random() * PRAISE.length)];
                feedback.innerHTML = `<span class="text-green-500 feedback-pop">${praise}</span>`;
                input.disabled = true;
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                speakText(praise);
            } else {
                wrongs++;
                stats.wrong++;
                playErrorSound();
                feedback.innerHTML = `<span class="text-red-500 feedback-pop">Try again!</span>`;
                
                if(wrongs >= 3) {
                    feedback.innerHTML = `<span class="text-red-500">The answer is: </span><span class="text-blue-600 font-bold">${questions[currentIdx].answer}</span>`;
                    input.disabled = true;
                    document.getElementById('check-btn').classList.add('hidden');
                    document.getElementById('next-btn').classList.remove('hidden');
                } else {
                    input.value = "";
                    input.focus();
                }
            }
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx >= questions.length) {
                showResults();
            } else {
                loadQuestion();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('stat-correct').innerText = stats.correct;
            document.getElementById('stat-wrong').innerText = stats.wrong;
            speakText("All done! You did a great job!");
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playErrorSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                if(!document.getElementById('check-btn').classList.contains('hidden')) {
                    checkAnswer();
                } else if(!document.getElementById('next-btn').classList.contains('hidden')) {
                    nextQuestion();
                }
            }
        });

        // Initialize voices
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
