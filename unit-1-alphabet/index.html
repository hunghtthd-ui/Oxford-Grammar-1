<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Bảng Chữ Cái Tiếng Anh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }

        .answer-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .answer-btn:active {
            transform: scale(0.95);
        }

        .correct {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #059669 !important;
        }

        .wrong {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #dc2626 !important;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-100">
        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 h-3">
            <div id="progress" class="bg-blue-500 h-3 transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="p-6 md:p-10">
            <!-- Header -->
            <div class="flex justify-between items-center mb-8">
                <span class="text-blue-600 font-bold text-lg">Question <span id="current-index">1</span>/26</span>
                <div id="lives" class="flex gap-1 text-red-500">
                    <!-- Hearts will be injected here -->
                </div>
            </div>

            <!-- Question Area -->
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-gray-700 mb-6">Listen and choose the correct letter</h2>
                
                <button id="listen-btn" class="group relative w-24 h-24 bg-pink-400 hover:bg-pink-500 rounded-full flex items-center justify-center mx-auto shadow-lg hover:shadow-xl transition-all border-4 border-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                </button>
                <p class="mt-3 text-pink-400 text-sm font-semibold uppercase tracking-widest">Click to hear the letter!</p>
            </div>

            <!-- Answers Grid -->
            <div id="answers-grid" class="grid grid-cols-2 gap-4">
                <!-- Buttons will be injected here -->
            </div>

            <!-- Feedback Message -->
            <div id="feedback" class="h-12 mt-8 text-center font-bold text-xl transition-all"></div>

            <!-- Next Button (Hidden initially) -->
            <button id="next-btn" class="hidden w-full mt-6 py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl shadow-md transition-all">
                NEXT QUESTION
            </button>

            <!-- Final Score (Hidden initially) -->
            <div id="final-screen" class="hidden text-center py-10">
                <h1 class="text-4xl font-extrabold text-pink-500 mb-4">Amazing! 🌟</h1>
                <p class="text-gray-600 text-lg mb-8">You finished the alphabet challenge, you're a star!</p>
                <button onclick="location.reload()" class="px-8 py-3 bg-blue-500 text-white font-bold rounded-full hover:bg-blue-600 shadow-lg">
                    Play Again
                </button>
            </div>
        </div>
    </div>

    <script>
        // Danh sách chữ cái gốc
        const originalAlphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let shuffledAlphabet = [];
        
        const praise = ["Well done!", "Good job!", "Excellent!", "Very good!", "Fantastic!", "Brilliant!"];
        
        let currentIndex = 0;
        let attempts = 0;
        const maxAttempts = 3;
        let currentLetter = '';
        let isAnswered = false;

        const synth = window.speechSynthesis;
        const listenBtn = document.getElementById('listen-btn');
        const nextBtn = document.getElementById('next-btn');
        const answersGrid = document.getElementById('answers-grid');
        const feedback = document.getElementById('feedback');
        const livesContainer = document.getElementById('lives');
        const progress = document.getElementById('progress');
        const currentIndexDisplay = document.getElementById('current-index');

        // Hàm xáo trộn mảng (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Tạo âm thanh hiệu ứng
        function playEffect(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.2);
            }
            
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }

        // Giọng đọc bé gái vui tươi
        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            const femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Google US English') || v.name.includes('Zira') || v.name.includes('Samantha')));
            
            if (femaleVoice) utterance.voice = femaleVoice;
            utterance.lang = 'en-US';
            utterance.pitch = 1.5; 
            utterance.rate = 1.1; 
            utterance.volume = 1;

            synth.speak(utterance);
        }

        function generateOptions(correct) {
            let options = [correct];
            while (options.length < 4) {
                let random = originalAlphabet[Math.floor(Math.random() * originalAlphabet.length)];
                if (!options.includes(random)) options.push(random);
            }
            return shuffleArray(options);
        }

        function updateLives() {
            livesContainer.innerHTML = '';
            for (let i = 0; i < maxAttempts; i++) {
                const heart = document.createElement('span');
                heart.innerHTML = i < (maxAttempts - attempts) ? '❤️' : '🖤';
                livesContainer.appendChild(heart);
            }
        }

        function initQuestion() {
            if (currentIndex >= shuffledAlphabet.length) {
                showFinalScreen();
                return;
            }

            isAnswered = false;
            attempts = 0;
            currentLetter = shuffledAlphabet[currentIndex];
            const options = generateOptions(currentLetter);

            currentIndexDisplay.innerText = currentIndex + 1;
            progress.style.width = `${(currentIndex / shuffledAlphabet.length) * 100}%`;
            feedback.innerText = '';
            nextBtn.classList.add('hidden');
            updateLives();

            answersGrid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn py-6 text-3xl font-bold bg-white border-4 border-gray-100 rounded-2xl text-gray-700 shadow-sm hover:border-pink-200 hover:bg-pink-50';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(opt, btn);
                answersGrid.appendChild(btn);
            });

            setTimeout(() => speak(currentLetter), 500);
        }

        function handleAnswer(selected, btn) {
            if (isAnswered) return;

            if (selected === currentLetter) {
                isAnswered = true;
                btn.classList.add('correct');
                playEffect('correct');
                const praiseMsg = praise[Math.floor(Math.random() * praise.length)];
                feedback.innerText = praiseMsg;
                feedback.className = 'h-12 mt-8 text-center font-bold text-xl text-green-600';
                speak(praiseMsg);
                nextBtn.classList.remove('hidden');
            } else {
                attempts++;
                updateLives();
                playEffect('wrong');
                btn.classList.add('wrong', 'shake');
                
                if (attempts >= maxAttempts) {
                    isAnswered = true;
                    feedback.innerText = `Look! It's the letter ${currentLetter}`;
                    feedback.className = 'h-12 mt-8 text-center font-bold text-xl text-red-600';
                    highlightCorrect();
                    nextBtn.classList.remove('hidden');
                } else {
                    feedback.innerText = "Try again, you can do it!";
                    feedback.className = 'h-12 mt-8 text-center font-bold text-xl text-orange-500';
                    setTimeout(() => btn.classList.remove('shake'), 500);
                }
            }
        }

        function highlightCorrect() {
            Array.from(answersGrid.children).forEach(btn => {
                if (btn.innerText === currentLetter) {
                    btn.classList.add('correct');
                }
            });
        }

        function showFinalScreen() {
            progress.style.width = '100%';
            document.querySelector('.text-center.mb-10').classList.add('hidden');
            answersGrid.classList.add('hidden');
            feedback.classList.add('hidden');
            nextBtn.classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');
            speak("Yay! You are so smart! You finished the whole alphabet!");
        }

        listenBtn.onclick = () => speak(currentLetter);
        nextBtn.onclick = () => {
            currentIndex++;
            initQuestion();
        };

        window.onload = () => {
            // Xáo trộn bảng chữ cái ngay khi bắt đầu
            shuffledAlphabet = shuffleArray([...originalAlphabet]);
            initQuestion();
        };
    </script>
</body>
</html>
